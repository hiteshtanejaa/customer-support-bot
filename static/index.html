<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Support</title>
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body>
  <div class="widget-container">

    <!-- Lead capture view -->
    <div id="lead-form-view" class="card">
      <div class="card-header">
        <div class="avatar">💬</div>
        <div>
          <h2>Chat with Support</h2>
          <p>We typically reply in a few seconds.</p>
        </div>
      </div>
      <form id="lead-form">
        <label for="visitor-name">Your name</label>
        <input type="text" id="visitor-name" placeholder="Jane Smith" required autocomplete="name" />

        <label for="visitor-email">Your email</label>
        <input type="email" id="visitor-email" placeholder="jane@example.com" required autocomplete="email" />

        <button type="submit" id="start-btn">Start Chat</button>
        <p id="form-error" class="error hidden"></p>
      </form>
    </div>

    <!-- Chat view (hidden until lead form is submitted) -->
    <div id="chat-view" class="card hidden">
      <div class="chat-header">
        <div class="avatar">💬</div>
        <div>
          <strong>Support Chat</strong>
          <span id="greeted-name" class="subtext"></span>
        </div>
      </div>

      <div id="message-list" role="log" aria-live="polite"></div>

      <div class="input-row">
        <input
          type="text"
          id="user-input"
          placeholder="Type a message…"
          autocomplete="off"
          aria-label="Message input"
        />
        <button id="send-btn" aria-label="Send">Send</button>
      </div>
    </div>

  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
